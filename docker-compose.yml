services:
  catalog:
    env_file:
      - .env
    build:
      context: .
      dockerfile: services/bat-catalog-service/dockerfile
    # container_name removido para permitir replicação
    # ports expostos removidos para evitar conflito na máquina física. O Docker balanceia internamente.
    deploy:
      replicas: 2

  order:
    env_file:
      - .env
    build:
      context: .
      dockerfile: services/bat-order-service/dockerfile
    depends_on:
      - catalog
      - redis
      - auth
      - payment
    deploy:
      replicas: 2

  payment:
    env_file:
      - .env
    build:
      context: .
      dockerfile: services/bat-payment-service/dockerfile
    depends_on:
      - catalog
    deploy:
      replicas: 2

  notification:
    env_file:
      - .env
    build:
      context: .
      dockerfile: services/bat-notification-service/dockerfile
    depends_on:
      - redis
    deploy:
      replicas: 2

  auth:
    env_file:
      - .env
    build:
      context: .
      dockerfile: services/bat-auth-service/dockerfile
    deploy:
      replicas: 2

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --save 60 1 --loglevel warning --appendonly yes
    ports:
      - "${REDIS_HOST_PORT}:${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-replica:
    image: redis:7-alpine
    container_name: redis-replica
    depends_on:
      - redis
    command: redis-server --replicaof redis ${REDIS_PORT} --save 60 1 --loglevel warning
    ports:
      - "6380:${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - auth
      - catalog
      - order
      - payment
      - notification

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_HOST_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "${JAEGER_HOST_PORT}:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  interface:
    env_file:
      - .env
    build:
      context: .
      dockerfile: interface/Dockerfile
    container_name: interface
    ports:
      - "5000:5000"
    depends_on:
      - auth
      - catalog
      - order
      - payment
      - notification
    environment:
      AUTH_SERVICE_URL: http://auth:8000
      CATALOG_SERVICE_URL: http://catalog:8000
      ORDER_SERVICE_URL: http://order:8000
      PAYMENT_SERVICE_URL: http://payment:8000
      NOTIFICATION_SERVICE_URL: http://notification:8000
      FLASK_SECRET_KEY: change-me-in-production

volumes:
  prometheus_data:
  grafana_data: