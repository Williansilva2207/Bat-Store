services:
  bat-catalog-service:
    container_name: bat-catalog-service
    env_file:
      - .env
    build:
      context: .
      dockerfile: services/bat-catalog-service/dockerfile
    ports:
      - "${CATALOG_HOST_PORT}:8000"

  bat-order-service:
    container_name: bat-order-service
    env_file:
      - .env
    build:
      context: .
      dockerfile: services/bat-order-service/dockerfile
    ports:
      - "${ORDER_HOST_PORT}:8000"
    depends_on:
      - bat-catalog-service
      - redis
      - bat-auth-service
      - bat-payment-service

  bat-payment-service:
    container_name: bat-payment-service
    env_file:
      - .env
    build:
      context: .
      dockerfile: services/bat-payment-service/dockerfile
    ports:
      - "${PAYMENT_HOST_PORT}:8000"
    depends_on:
      - bat-catalog-service

  bat-notification-service:
    container_name: bat-notification-service
    env_file:
      - .env
    build:
      context: .
      dockerfile: services/bat-notification-service/dockerfile
    ports:
      - "${NOTIFICATION_HOST_PORT}:8000"
    depends_on:
      - redis

  bat-auth-service:
    container_name: bat-auth-service
    env_file:
      - .env
    build:
      context: .
      dockerfile: services/bat-auth-service/dockerfile
    ports:
      - "${AUTH_HOST_PORT}:8000"

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --save 60 1 --loglevel warning --appendonly yes
    ports:
      - "${REDIS_HOST_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - bat-auth-service
      - bat-catalog-service
      - bat-order-service
      - bat-payment-service
      - bat-notification-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_HOST_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./docs/grafana-dashboard.json:/var/lib/grafana/dashboards/bat-store.json
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "${JAEGER_HOST_PORT}:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  interface:
    container_name: interface
    env_file:
      - .env
    build:
      context: ./interface
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    depends_on:
      - bat-auth-service
      - bat-catalog-service
      - bat-order-service
      - bat-payment-service
      - bat-notification-service
    environment:
      AUTH_SERVICE_URL: http://bat-auth-service:8000
      CATALOG_SERVICE_URL: http://bat-catalog-service:8000
      ORDER_SERVICE_URL: http://bat-order-service:8000
      PAYMENT_SERVICE_URL: http://bat-payment-service:8000
      NOTIFICATION_SERVICE_URL: http://bat-notification-service:8000
      FLASK_SECRET_KEY: change-me-in-production

volumes:
  prometheus_data:
  grafana_data: