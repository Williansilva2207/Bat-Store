<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bat-Store - Catálogo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        nav {
            background: #0f3460;
            padding: 20px 0;
            margin-bottom: 40px;
            border-bottom: 3px solid #e94560;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        
        nav a:hover {
            color: #e94560;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #e94560;
        }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .item-card {
            background: #0f3460;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #e94560;
        }
        
        .item-card h3 {
            color: #e94560;
            margin-bottom: 10px;
        }
        
        .item-card p {
            margin: 5px 0;
            font-size: 14px;
        }
        
        .price {
            font-size: 18px;
            font-weight: bold;
            color: #28a745;
            margin: 10px 0;
        }
        
        .stock {
            background: #1a1a2e;
            padding: 5px 10px;
            border-radius: 4px;
            display: inline-block;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="/">Início</a></li>
            <li><a href="/catalog">Catálogo</a></li>
            <li><a href="/orders">Pedidos</a></li>
            <li><a href="/observability">Observabilidade</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <h1>🦇 Catálogo de Produtos</h1>
        
        <div class="items-grid">
            {% for item in items %}
                <div class="item-card">
                    <h3>{{ item.name }}</h3>
                    <p>{{ item.description }}</p>
                    <div class="price">R$ {{ "%.2f"|format(item.price) }}</div>
                    <div class="stock">Estoque: {{ item.stock }}</div>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
